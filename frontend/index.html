<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>是陶。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#2C4A6E;--gl:#E8EEF5;--t:#1C2B3A;--m:#6B7280;--b:#D4CFC9;--bg:#E0DCD5;--w:#F5F2EE;--r:#8B6F47;--rl:#F5EDE0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);font-size:15px;line-height:1.6}
.topbar{background:var(--w);border-bottom:1px solid var(--b);padding:0 24px;height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(28,43,58,.06)}
.logo{font-size:20px;font-weight:700;color:var(--t)}.logo span{color:var(--g)}
.wrap{max-width:1200px;margin:0 auto;padding:24px 20px 100px}
.fbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.fc{padding:6px 16px;border-radius:99px;border:1px solid var(--b);font-size:13px;cursor:pointer;background:transparent;color:var(--m);transition:all .15s;font-family:inherit}
.fc.on{background:var(--g);color:#fff;border-color:var(--g)}

/* Desktop layout */
.layout{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(162px,1fr));gap:14px}

/* Product card */
.pc{background:var(--w);border:1px solid var(--b);border-radius:12px;overflow:hidden;transition:border-color .15s,box-shadow .15s;cursor:pointer}
.pc:hover{border-color:var(--g);box-shadow:0 3px 12px rgba(44,74,110,.1)}
.pimg{width:100%;aspect-ratio:1;background:var(--bg);position:relative;overflow:hidden}
.pimg img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.pc:hover .pimg img{transform:scale(1.04)}
.pimg-count{position:absolute;bottom:7px;right:7px;background:rgba(28,43,58,.6);color:#fff;font-size:10px;padding:2px 7px;border-radius:99px}
.smask{position:absolute;inset:0;background:rgba(28,43,58,.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;letter-spacing:.5px}
.pbody{padding:12px 14px}
.pname{font-size:13px;font-weight:700;margin-bottom:3px;color:var(--t)}
.psize{font-size:11px;color:var(--m);margin-bottom:4px}
.pprice{font-size:15px;font-weight:700;color:var(--g);margin-bottom:6px}
.pdesc{font-size:11px;color:var(--m);margin-bottom:9px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.abtn{width:100%;padding:8px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.abtn:hover{background:#1e3450}.abtn:disabled{background:var(--b);color:var(--m);cursor:not-allowed}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(10,15,20,.92);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb-img{max-width:92vw;max-height:75vh;object-fit:contain;border-radius:8px;user-select:none}
.lb-thumbs{display:flex;gap:8px;margin-top:16px;overflow-x:auto;padding:4px 16px;max-width:92vw}
.lb-thumb{width:52px;height:52px;border-radius:6px;object-fit:cover;cursor:pointer;opacity:.55;border:2px solid transparent;flex-shrink:0;transition:all .15s}
.lb-thumb.on{opacity:1;border-color:#fff}
.lb-close{position:absolute;top:18px;right:20px;background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;opacity:.7}
.lb-close:hover{opacity:1}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lb-nav:hover{background:rgba(255,255,255,.3)}
.lb-prev{left:16px}.lb-right{right:16px}
.lb-info{color:rgba(255,255,255,.7);font-size:13px;margin-top:10px}

/* Desktop Cart */
.cbox{background:var(--w);border:1px solid var(--b);border-radius:12px;padding:18px;position:sticky;top:68px}
.chdr{font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;color:var(--t)}
.ccnt{background:var(--g);color:#fff;border-radius:99px;font-size:11px;font-weight:700;padding:2px 9px}
.cempty{text-align:center;padding:28px 0;color:var(--m);font-size:13px}
.ci{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--b);align-items:flex-start}
.cimg{width:42px;height:42px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.cimg img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.cn{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t)}
.csz{font-size:11px;color:var(--m);margin-top:1px}
.cp{font-size:13px;font-weight:700;color:var(--g);flex-shrink:0;padding-top:2px}
.qr{display:flex;align-items:center;gap:5px;margin-top:5px}
.qb{width:22px;height:22px;border-radius:5px;border:1px solid var(--b);background:transparent;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:inherit;color:var(--t)}
.totbl{margin-top:12px;padding-top:12px;border-top:1px solid var(--b)}
.tr{display:flex;justify-content:space-between;font-size:13px;color:var(--m);margin-bottom:5px}
.tr.grand{font-weight:700;font-size:15px;color:var(--t);margin-top:8px}
.cbtn{width:100%;margin-top:12px;padding:11px;background:var(--g);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.cbtn:hover{background:#1e3450}

/* Mobile cart button */
.m-cart-btn{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--g);color:#fff;border:none;border-radius:99px;padding:13px 28px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;z-index:90;box-shadow:0 4px 16px rgba(44,74,110,.3);white-space:nowrap}

/* Mobile cart drawer */
.m-cart-overlay{position:fixed;inset:0;background:rgba(28,43,58,.5);z-index:150;display:none}
.m-cart-overlay.open{display:block}
.m-cart{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-radius:18px 18px 0 0;padding:20px;z-index:160;max-height:80vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s}
.m-cart.open{transform:translateY(0)}
.m-cart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.m-cart-close{background:transparent;border:none;font-size:22px;cursor:pointer;color:var(--m);line-height:1}

/* Checkout Modal */
.ov{position:fixed;inset:0;background:rgba(28,43,58,.55);z-index:200;display:none;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.mo{background:var(--w);border-radius:18px 18px 0 0;padding:26px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.mtitle{font-size:17px;font-weight:700;margin-bottom:4px;color:var(--t)}
.msub{font-size:13px;color:var(--m);margin-bottom:20px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.lbl{font-size:11px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=email],input[type=tel],textarea{padding:10px 12px;border:1px solid var(--b);border-radius:8px;font-size:14px;font-family:inherit;background:var(--w);color:var(--t);outline:none;transition:border-color .15s;width:100%}
input:focus,textarea:focus{border-color:var(--g)}
textarea{resize:vertical;min-height:72px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.po{display:flex;align-items:center;gap:11px;padding:11px;border:1.5px solid var(--b);border-radius:9px;cursor:pointer;margin-bottom:7px;transition:all .15s}
.po:hover{background:var(--bg)}.po.sel{border-color:var(--g);background:var(--gl)}
.pl{font-size:14px;font-weight:600;color:var(--t)}.ps{font-size:11px;color:var(--m);margin-top:1px}
.ordsum{background:var(--bg);padding:12px;border-radius:9px;font-size:13px;margin-top:14px;border:1px solid var(--b)}
.mftr{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;padding:9px 20px;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;border:none}
.bg{background:var(--g);color:#fff}.bg:hover{background:#1e3450}.bg:disabled{opacity:.4;cursor:not-allowed}
.bo{background:transparent;border:1px solid var(--b);color:var(--m)}.bo:hover{background:var(--bg)}
.sbox{text-align:center;padding:28px 0}
#toast{position:fixed;bottom:80px;right:16px;background:var(--t);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(12px);transition:all .25s;pointer-events:none;max-width:calc(100vw - 32px)}
#toast.show{opacity:1;transform:translateY(0)}
.loading{text-align:center;padding:40px;color:var(--m);font-size:14px}

@media(max-width:700px){
  .layout{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .cbox{display:none}
  .m-cart-btn{display:block}
  .wrap{padding:16px 14px 100px}
  .topbar{padding:0 16px}
  .f2{grid-template-columns:1fr}
  .mo{border-radius:18px 18px 0 0;max-width:100%}
  #toast{bottom:90px}
}
@media(min-width:701px){
  .ov{align-items:center}
  .mo{border-radius:14px;max-width:430px}
}
</style>
</head>
<body>

<script>
const API = 'https://pottery-shop.onrender.com';
</script>

<div class="topbar">
  <div class="logo">是陶<span>。</span></div>
</div>

<div class="wrap">
  <div class="fbar">
    <button class="fc on" onclick="setCat(this,'')">全部</button>
    <button class="fc" onclick="setCat(this,'花器')">花器</button>
    <button class="fc" onclick="setCat(this,'線香座')">線香座</button>
    <button class="fc" onclick="setCat(this,'陶器皿')">陶器皿</button>
    <button class="fc" onclick="setCat(this,'其他')">其他</button>
  </div>
  <div class="layout">
    <div class="grid" id="grid"><div class="loading">載入中...</div></div>
    <div class="cbox" id="desktop-cart">
      <div class="chdr"><span>購物車</span><span class="ccnt" id="ccnt-d">0</span></div>
      <div id="cbody-d"><div class="cempty">尚未加入任何商品</div></div>
      <div class="totbl" id="totbl-d" style="display:none">
        <div class="tr"><span>小計</span><span id="sub-d"></span></div>
        <div class="tr"><span>運費</span><span>NT$160</span></div>
        <div class="tr grand"><span>合計</span><span id="grand-d"></span></div>
        <button class="cbtn" onclick="openModal()">前往結帳</button>
      </div>
    </div>
  </div>
</div>

<!-- Mobile cart button -->
<button class="m-cart-btn" id="m-cart-btn" onclick="openMCart()">購物車 <span id="ccnt-m" style="background:rgba(255,255,255,.25);border-radius:99px;padding:1px 8px;font-size:12px">0</span></button>

<!-- Mobile cart drawer -->
<div class="m-cart-overlay" id="m-cart-overlay" onclick="closeMCart()"></div>
<div class="m-cart" id="m-cart">
  <div class="m-cart-hdr">
    <div style="font-size:15px;font-weight:700;color:var(--t)">購物車</div>
    <button class="m-cart-close" onclick="closeMCart()">×</button>
  </div>
  <div id="cbody-m"><div class="cempty">尚未加入任何商品</div></div>
  <div class="totbl" id="totbl-m" style="display:none">
    <div class="tr"><span>小計</span><span id="sub-m"></span></div>
    <div class="tr"><span>運費</span><span>NT$160</span></div>
    <div class="tr grand"><span>合計</span><span id="grand-m"></span></div>
    <button class="cbtn" onclick="closeMCart();openModal()">前往結帳</button>
  </div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb">
  <button class="lb-close" onclick="closeLb()">×</button>
  <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
  <img class="lb-img" id="lb-img" src="" alt="">
  <button class="lb-nav lb-right" onclick="lbNav(1)">›</button>
  <div class="lb-info" id="lb-info"></div>
  <div class="lb-thumbs" id="lb-thumbs"></div>
</div>

<!-- Checkout Modal -->
<div class="ov" id="ov">
  <div class="mo">
    <div id="cv">
      <div class="mtitle">填寫聯絡資料</div>
      <div class="msub">我們將以電話或 Email 確認訂單並安排出貨</div>
      <div class="f2">
        <div class="fg" style="margin:0"><label class="lbl">姓名 *</label><input type="text" id="cn" placeholder="王小明"></div>
        <div class="fg" style="margin:0"><label class="lbl">電話 *</label><input type="tel" id="cp" placeholder="0912-345-678"></div>
      </div>
      <div class="fg" style="margin-top:13px"><label class="lbl">電子郵件 *</label><input type="email" id="ce" placeholder="you@example.com"></div>
      <div class="fg"><label class="lbl">收件地址 *</label><input type="text" id="ca" placeholder="台北市信義區..."></div>
      <div class="fg"><label class="lbl">備註</label><textarea id="cnote" placeholder="特殊需求、包裝要求..."></textarea></div>
      <div class="lbl" style="margin:4px 0 9px">付款方式</div>
      <div class="po sel" onclick="setPay('銀行轉帳',this)">
        <div><div class="pl">銀行轉帳</div><div class="ps">下單後提供匯款帳號，3 天內完成付款</div></div>
        <input type="radio" name="pay" checked style="margin-left:auto">
      </div>
      <div class="ordsum">
        <div style="display:flex;justify-content:space-between;color:var(--m)"><span>訂單金額</span><span id="mtotal"></span></div>
        <div style="font-size:11px;color:var(--m);margin-top:6px">送出後，工坊會盡快與您聯繫</div>
      </div>
      <div class="mftr">
        <button class="btn bo" onclick="closeModal()">返回</button>
        <button class="btn bg" id="obtn" onclick="placeOrder()">送出訂單</button>
      </div>
    </div>
    <div class="sbox" id="sv" style="display:none">
      <div style="font-size:17px;font-weight:700;margin-bottom:10px;color:var(--t)">訂單已送出</div>
      <div style="font-size:13px;color:var(--m);margin-bottom:6px">訂單編號：<strong id="onum"></strong></div>
      <div style="font-size:13px;color:var(--m);margin-bottom:24px;line-height:1.8">感謝您的支持<br>我們將盡快以電話或 Email 確認您的訂單</div>
      <button class="btn bg" onclick="closeModal();resetCart()">繼續選購</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script>
function toast(msg,ok=true){const t=document.getElementById('toast');t.textContent=msg;t.style.background=ok?'#1C2B3A':'#8B6F47';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

let products=[],cart=[],cat='',pay='銀行轉帳';
let lbImgs=[],lbIdx=0;

// ── Products ──────────────────────────────────────────────
async function load(){
  try{
    const url=cat?`${API}/products?category=${encodeURIComponent(cat)}`:`${API}/products`;
    const res=await fetch(url);
    if(!res.ok)throw new Error('載入失敗');
    products=await res.json();render();
  }catch(e){document.getElementById('grid').innerHTML=`<div class="loading" style="color:var(--r)">${e.message}</div>`;}
}
function setCat(btn,c){document.querySelectorAll('.fc').forEach(x=>x.classList.remove('on'));btn.classList.add('on');cat=c;load();}

function getImgs(p){
  if(p.image_urls&&p.image_urls.length)return p.image_urls;
  if(p.image_url)return[p.image_url];
  return[];
}

function render(){
  const g=document.getElementById('grid');
  if(!products.length){g.innerHTML='<div class="loading">此分類暫無商品</div>';return;}
  g.innerHTML=products.map(p=>{
    const so=p.stock===0;
    const imgs=getImgs(p);
    const mainImg=imgs.length?`<img src="${imgs[0]}" loading="lazy">`:`<div style="width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--b)">◻</div>`;
    const countBadge=imgs.length>1?`<div class="pimg-count">${imgs.length} 張</div>`:'';
    const sizeInfo=(p.sizes||'').trim()?`<div class="psize">${p.sizes}</div>`:'';
    const descInfo=(p.description||'').trim()?`<div class="pdesc">${p.description}</div>`:'';
    return `<div class="pc">
      <div class="pimg" onclick="openLb(${p.id})">${mainImg}${countBadge}${so?'<div class="smask">售完</div>':''}</div>
      <div class="pbody">
        <div class="pname">${p.name}</div>
        ${sizeInfo}
        <div class="pprice">NT$${p.price.toLocaleString()}</div>
        ${descInfo}
        <button class="abtn" ${so?'disabled':''} onclick="add(${p.id})">${so?'已售完':'加入購物車'}</button>
      </div>
    </div>`;
  }).join('');
}

// ── Lightbox ──────────────────────────────────────────────
function openLb(pid){
  const p=products.find(x=>x.id===pid);
  lbImgs=getImgs(p);
  if(!lbImgs.length)return;
  lbIdx=0;
  renderLb();
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLb(){
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow='';
}
function lbNav(d){
  lbIdx=(lbIdx+d+lbImgs.length)%lbImgs.length;
  renderLb();
}
function lbGo(i){lbIdx=i;renderLb();}
function renderLb(){
  document.getElementById('lb-img').src=lbImgs[lbIdx];
  document.getElementById('lb-info').textContent=lbImgs.length>1?`${lbIdx+1} / ${lbImgs.length}`:'';
  document.getElementById('lb-thumbs').innerHTML=lbImgs.map((u,i)=>
    `<img class="lb-thumb ${i===lbIdx?'on':''}" src="${u}" onclick="lbGo(${i})">`
  ).join('');
  // hide nav if single image
  document.querySelectorAll('.lb-nav').forEach(n=>n.style.display=lbImgs.length>1?'flex':'none');
}
// Swipe support for lightbox
let lbTouchX=null;
document.getElementById('lb').addEventListener('touchstart',e=>lbTouchX=e.touches[0].clientX);
document.getElementById('lb').addEventListener('touchend',e=>{
  if(lbTouchX===null)return;
  const dx=e.changedTouches[0].clientX-lbTouchX;
  if(Math.abs(dx)>40)lbNav(dx<0?1:-1);
  lbTouchX=null;
});
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='ArrowLeft')lbNav(-1);
  if(e.key==='ArrowRight')lbNav(1);
  if(e.key==='Escape')closeLb();
});

// ── Cart ──────────────────────────────────────────────────
function add(pid){
  const p=products.find(x=>x.id===pid),ex=cart.find(c=>c.pid===pid);
  if(ex)ex.qty++;else{const imgs=getImgs(p);cart.push({pid,qty:1,name:p.name,price:p.price,img:imgs[0]||null,sizes:p.sizes});}
  renderCart();toast(`已加入「${p.name}」`);
}
function chgQty(pid,d){
  const i=cart.findIndex(c=>c.pid===pid);if(i<0)return;
  cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);renderCart();
}

function cartItemsHTML(){
  return cart.map(c=>{
    const img=c.img?`<img src="${c.img}">`:`<div style="width:42px;height:42px;background:var(--bg);border-radius:8px"></div>`;
    return `<div class="ci">
      <div class="cimg">${img}</div>
      <div style="flex:1;min-width:0">
        <div class="cn">${c.name}</div>
        ${c.sizes?`<div class="csz">${c.sizes}</div>`:''}
        <div class="qr">
          <button class="qb" onclick="chgQty(${c.pid},-1)">−</button>
          <span style="font-size:13px;min-width:16px;text-align:center">${c.qty}</span>
          <button class="qb" onclick="chgQty(${c.pid},1)">+</button>
        </div>
      </div>
      <div class="cp">NT$${(c.price*c.qty).toLocaleString()}</div>
    </div>`;
  }).join('');
}

function renderCart(){
  const tot=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const cnt=cart.reduce((s,c)=>s+c.qty,0);
  // update counts
  document.getElementById('ccnt-d').textContent=cnt;
  document.getElementById('ccnt-m').textContent=cnt;
  // desktop
  const bd=document.getElementById('cbody-d'),td=document.getElementById('totbl-d');
  // mobile
  const bm=document.getElementById('cbody-m'),tm=document.getElementById('totbl-m');
  if(!cart.length){
    bd.innerHTML=bm.innerHTML='<div class="cempty">尚未加入任何商品</div>';
    td.style.display=tm.style.display='none';return;
  }
  const html=cartItemsHTML();
  bd.innerHTML=bm.innerHTML=html;
  td.style.display=tm.style.display='block';
  ['sub-d','sub-m'].forEach(id=>document.getElementById(id).textContent='NT$'+tot.toLocaleString());
  ['grand-d','grand-m'].forEach(id=>document.getElementById(id).textContent='NT$'+(tot+160).toLocaleString());
}

// Mobile cart drawer
function openMCart(){
  document.getElementById('m-cart-overlay').classList.add('open');
  document.getElementById('m-cart').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeMCart(){
  document.getElementById('m-cart-overlay').classList.remove('open');
  document.getElementById('m-cart').classList.remove('open');
  document.body.style.overflow='';
}

// ── Checkout ──────────────────────────────────────────────
function openModal(){
  const tot=cart.reduce((s,c)=>s+c.price*c.qty,0)+160;
  document.getElementById('mtotal').textContent='NT$'+tot.toLocaleString();
  document.getElementById('ov').classList.add('open');
  document.getElementById('cv').style.display='block';
  document.getElementById('sv').style.display='none';
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('ov').classList.remove('open');document.body.style.overflow='';}
function setPay(v,el){
  document.querySelectorAll('.po').forEach(o=>{o.classList.remove('sel');o.querySelector('input').checked=false;});
  el.classList.add('sel');el.querySelector('input').checked=true;pay=v;
}
async function placeOrder(){
  const name=document.getElementById('cn').value.trim(),phone=document.getElementById('cp').value.trim();
  const email=document.getElementById('ce').value.trim(),addr=document.getElementById('ca').value.trim();
  if(!name||!phone||!email||!addr){toast('請填寫所有必填欄位',false);return;}
  const btn=document.getElementById('obtn');btn.disabled=true;btn.textContent='送出中...';
  try{
    const res=await fetch(`${API}/orders`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        customer_name:name,customer_email:email,customer_phone:phone,
        address:addr,payment_method:pay,note:document.getElementById('cnote').value,
        items:cart.map(c=>({product_id:c.pid,product_name:c.name,size:c.sizes||'',qty:c.qty,unit_price:c.price}))
      })
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.detail||'下單失敗');
    document.getElementById('onum').textContent='#'+data.order_id;
    document.getElementById('cv').style.display='none';
    document.getElementById('sv').style.display='block';
  }catch(e){toast(e.message,false);}
  finally{btn.disabled=false;btn.textContent='送出訂單';}
}
function resetCart(){cart=[];renderCart();load();}
load();
</script>
