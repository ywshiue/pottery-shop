<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>是陶。後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#2C4A6E;--gl:#E8EEF5;--t:#1C2B3A;--m:#6B7280;--b:#D4CFC9;--bg:#E0DCD5;--w:#F5F2EE;--r:#8B6F47;--rl:#F5EDE0;--al:#F0EBE0;--a:#7A6040}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);font-size:14px;line-height:1.8;font-weight:300;letter-spacing:.3px}

/* ── Login ─────────────────────────────────────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--w);border:1px solid var(--b);border-radius:16px;padding:36px 32px;width:100%;max-width:360px;text-align:center;box-shadow:0 4px 24px rgba(28,43,58,.08)}
.login-logo{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:500;letter-spacing:3px;margin-bottom:6px;color:var(--t)}.login-logo span{color:var(--g)}
.login-sub{font-size:13px;color:var(--m);margin-bottom:28px}
.err{font-size:12px;color:var(--r);margin-bottom:12px;padding:9px;background:var(--rl);border-radius:7px;display:none;text-align:left}

/* ── Topbar ─────────────────────────────────────────────── */
.topbar{background:var(--w);border-bottom:1px solid var(--b);padding:0 18px 0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;overflow:visible}
.logo{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:500;letter-spacing:2.5px;color:var(--t)}.logo span{color:var(--g)}

/* ── Top tab nav (replaces bottom nav) ──────────────────── */
.top-tabs{display:flex;background:var(--w);border-bottom:1px solid var(--b);position:sticky;top:52px;z-index:99}
.top-tab{flex:1;padding:12px 0;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:500;color:var(--m);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.top-tab.on{color:var(--g);border-bottom-color:var(--g);background:var(--gl)}
.tab-icon{font-size:16px}

/* ── Pane ───────────────────────────────────────────────── */
.pane{display:none}.pane.on{display:block}
.wrap{max-width:900px;margin:0 auto;padding:16px 14px 32px}

/* ── Order filter bar ───────────────────────────────────── */
.o-filter-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:14px;padding-bottom:2px}
.o-filter-bar{display:flex;gap:6px;min-width:max-content;padding:2px 2px}
.o-ftab{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:99px;border:1px solid var(--b);font-size:12px;font-weight:500;cursor:pointer;background:var(--w);color:var(--m);transition:all .15s;font-family:inherit;white-space:nowrap}
.o-ftab:hover{border-color:var(--g);color:var(--g)}
.o-ftab.on{background:var(--g);color:#fff;border-color:var(--g)}
.o-ftab .cnt{background:rgba(0,0,0,.08);border-radius:99px;padding:1px 8px;font-size:11px;font-weight:700;min-width:20px;text-align:center}
.o-ftab.on .cnt{background:rgba(255,255,255,.3)}

/* ── Order card ─────────────────────────────────────────── */
.o-card{background:var(--w);border:1px solid var(--b);border-radius:12px;padding:16px;margin-bottom:12px;transition:box-shadow .15s}
.o-card:hover{box-shadow:0 2px 10px rgba(28,43,58,.07)}
.o-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.o-id{font-weight:700;font-size:14px;color:var(--t)}
.o-date{font-size:11px;color:var(--m);margin-top:2px}
.o-name{font-size:14px;font-weight:600;margin-bottom:3px}
.o-contact{font-size:12px;color:var(--m);margin-bottom:2px}
.o-addr{font-size:12px;color:var(--m);margin-bottom:8px}
.o-items-str{font-size:13px;color:var(--t);background:var(--bg);padding:7px 10px;border-radius:7px;margin-bottom:10px;line-height:1.5}
.o-amount{font-size:15px;font-weight:700;color:var(--g);margin-bottom:12px}
.o-pay{font-size:11px;color:var(--m);font-weight:400;margin-left:6px}

/* ── Progress: dot + line ───────────────────────────────── */
.progress-wrap{margin-bottom:14px}
.progress-label{font-size:10px;letter-spacing:.8px;color:var(--m);text-transform:uppercase;margin-bottom:10px}
.progress-steps{display:flex;align-items:flex-start}
.p-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;cursor:pointer}
/* connecting line */
.p-step:not(:last-child)::after{content:'';position:absolute;top:14px;left:50%;width:100%;height:3px;background:var(--b);z-index:0;transition:background .2s}
.p-step.done::after{background:var(--g)}
.p-step.active::after{background:var(--b)}
/* dot */
.p-dot{width:28px;height:28px;border-radius:50%;border:3px solid var(--b);background:var(--w);display:flex;align-items:center;justify-content:center;font-size:12px;position:relative;z-index:1;transition:all .2s;color:var(--m)}
.p-step:hover .p-dot{border-color:var(--g);background:var(--gl)}
.p-step.done .p-dot{background:var(--g);border-color:var(--g);color:#fff}
.p-step.active .p-dot{border-color:var(--g);border-width:3px;background:var(--w);box-shadow:0 0 0 4px var(--gl);color:var(--g)}
.p-step-label{font-size:10px;font-weight:600;margin-top:6px;text-align:center;white-space:nowrap;color:var(--m);transition:color .2s}
.p-step.done .p-step-label{color:var(--g)}
.p-step.active .p-step-label{color:var(--g);font-weight:700}
/* cancelled */
.cancelled-wrap{display:flex;align-items:center;gap:8px;background:var(--rl);padding:10px 14px;border-radius:8px;color:var(--r)}
.cancelled-wrap span{font-size:13px;font-weight:600}

.o-note{font-size:12px;color:var(--g);background:var(--gl);padding:8px 11px;border-radius:7px;margin-bottom:10px;line-height:1.5}
.o-actions{display:flex;gap:7px;flex-wrap:wrap}

/* ── Buttons ────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;border:none}
.bg{background:var(--g);color:#fff}.bg:hover{background:#1e3450}.bg:disabled{opacity:.4;cursor:not-allowed}
.bo{background:transparent;border:1px solid var(--b);color:var(--m)}.bo:hover{background:var(--bg)}
.br{background:transparent;border:1px solid var(--b);color:var(--r)}.br:hover{background:var(--rl);border-color:var(--r)}

/* ── Product form & list ────────────────────────────────── */
.card{background:var(--w);border:1px solid var(--b);border-radius:12px;padding:18px;margin-bottom:16px}
.ttl{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--t)}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.lbl{font-size:10px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.8px}
input[type=text],input[type=number],input[type=email],input[type=password],select,textarea{padding:9px 12px;border:1px solid var(--b);border-radius:8px;font-size:14px;font-family:inherit;background:var(--w);color:var(--t);outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--g)}
textarea{resize:vertical;min-height:68px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.size-row{display:flex;align-items:center;gap:6px}
.size-row input{text-align:center;padding:8px 6px}
.size-sep{color:var(--b);font-size:16px;flex-shrink:0}

/* Multi image */
.img-upload-area{border:2px dashed var(--b);border-radius:9px;padding:14px;transition:all .15s;position:relative;text-align:center}
.img-upload-area:hover{border-color:var(--g);background:var(--gl)}
.img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:8px}
.img-item{position:relative;aspect-ratio:1;border-radius:7px;overflow:hidden;background:var(--bg)}
.img-item img{width:100%;height:100%;object-fit:cover}
.img-item-del{position:absolute;top:3px;right:3px;width:20px;height:20px;background:rgba(28,43,58,.7);color:#fff;border:none;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-item-main{position:absolute;bottom:3px;left:3px;font-size:9px;background:var(--g);color:#fff;padding:1px 5px;border-radius:3px}
.img-add-hint{font-size:12px;color:var(--m);padding:8px 0}

/* Product card (mobile list) */
.p-card{background:var(--w);border:1px solid var(--b);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.p-card-img{width:60px;height:60px;border-radius:8px;object-fit:cover;background:var(--bg);flex-shrink:0}
.p-card-info{flex:1;min-width:0}
.p-card-name{font-size:14px;font-weight:600;margin-bottom:2px}
.p-card-meta{font-size:11px;color:var(--m);margin-bottom:6px}
.p-card-price{font-size:14px;font-weight:700;color:var(--g)}
.bdg{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;margin-left:6px}
.bg2{background:var(--gl);color:var(--g)}.ba{background:var(--al);color:var(--a)}.br2{background:var(--rl);color:var(--r)}

/* Note modal */
.note-ov{position:fixed;inset:0;background:rgba(28,43,58,.55);z-index:300;display:none;align-items:flex-end;justify-content:center}
.note-ov.open{display:flex}
.note-mo{background:var(--w);border-radius:18px 18px 0 0;padding:22px 22px 74px;width:100%;max-width:500px}
.note-title{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--t)}
.note-ftr{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}

#toast{position:fixed;bottom:20px;right:14px;background:var(--t);color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(12px);transition:all .25s;pointer-events:none;max-width:calc(100vw - 28px)}
#toast.show{opacity:1;transform:translateY(0)}

@media(min-width:700px){
  .wrap{padding:20px 20px 32px}
  .p-step-label{font-size:10px}
  .o-ftab{padding:7px 16px}
}
</style>
</head>
<body>

<script>
const API = 'https://pottery-shop.onrender.com';
</script>

<!-- ══ 登入 ═══════════════════════════════════════════════ -->
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <svg width="58" height="58" viewBox="-2 -2 124 124" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M62 7 C76 3 94 10 106 24 C120 40 124 62 116 80 C107 100 88 112 66 114 C44 116 24 104 14 86 C2 66 2 42 16 24 C30 8 46 3 62 7 Z" stroke="#2C4A6E" stroke-width="2.5" fill="none"/>
  <path d="M62 17 C74 14 89 20 99 32 C111 46 114 65 107 81 C99 97 83 106 64 108 C45 110 28 101 20 87 C10 71 11 50 22 36 C34 20 49 16 62 17 Z" stroke="#7BA3C8" stroke-width="1.2" fill="none" opacity=".5"/>
  <ellipse cx="48" cy="44" rx="16" ry="10" stroke="#2C4A6E" stroke-width="1.4" fill="none" opacity=".5" transform="rotate(-15 48 44)"/>

    <div style="font-family:'Shippori Mincho',serif;font-size:22px;font-weight:500;color:#1C2B3A;letter-spacing:3px;margin:8px 0 4px">是陶。</div>
    <div style="font-family:'Noto Sans TC',sans-serif;font-size:9px;font-weight:300;color:#6B7280;letter-spacing:2.5px;text-transform:uppercase">It's Pottery</div>
    <div class="login-sub">管理後台</div>
    <div class="fg" style="text-align:left"><label class="lbl">Email</label><input type="email" id="l-email" placeholder="your@email.com"></div>
    <div class="fg" style="text-align:left;margin-bottom:16px"><label class="lbl">密碼</label><input type="password" id="l-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="err" id="l-err"></div>
    <button class="btn bg" style="width:100%;justify-content:center;padding:11px;font-size:14px" id="l-btn" onclick="doLogin()">登入</button>
  </div>
</div>

<!-- ══ 後台 ═══════════════════════════════════════════════ -->
<div id="admin-screen" style="display:none">

  <!-- Topbar -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <svg width="38" height="38" viewBox="-2 -2 124 124" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M62 7 C76 3 94 10 106 24 C120 40 124 62 116 80 C107 100 88 112 66 114 C44 116 24 104 14 86 C2 66 2 42 16 24 C30 8 46 3 62 7 Z" stroke="#2C4A6E" stroke-width="2.5" fill="none"/>
  <path d="M62 17 C74 14 89 20 99 32 C111 46 114 65 107 81 C99 97 83 106 64 108 C45 110 28 101 20 87 C10 71 11 50 22 36 C34 20 49 16 62 17 Z" stroke="#7BA3C8" stroke-width="1.2" fill="none" opacity=".5"/>
  <ellipse cx="48" cy="44" rx="16" ry="10" stroke="#2C4A6E" stroke-width="1.4" fill="none" opacity=".5" transform="rotate(-15 48 44)"/>
  <ellipse cx="82" cy="72" rx="13" ry="8" stroke="#2C4A6E" stroke-width="1.2" fill="none" opacity=".4" transform="rotate(10 82 72)"/>
  <circle cx="92" cy="40" r="5" stroke="#2C4A6E" stroke-width="1.2" fill="none" opacity=".5"/>
  <circle cx="34" cy="64" r="4" stroke="#7BA3C8" stroke-width="1" fill="none" opacity=".4"/>
  <line x1="40" y1="28" x2="56" y2="34" stroke="#7BA3C8" stroke-width=".8" stroke-linecap="round" opacity=".4"/>
  <line x1="88" y1="56" x2="100" y2="64" stroke="#7BA3C8" stroke-width=".8" stroke-linecap="round" opacity=".35"/>
</svg>
      <div>
        <div style="font-family:'Shippori Mincho',serif;font-size:15px;font-weight:500;color:#1C2B3A;letter-spacing:2px;line-height:1">是陶。</div>
        <div style="font-family:'Noto Sans TC',sans-serif;font-size:8px;font-weight:300;color:#6B7280;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px">後台</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:11px;color:var(--m)" id="user-email"></span>
      <button class="btn bo" style="padding:4px 10px" onclick="doLogout()">登出</button>
    </div>
  </div>

  <!-- Top tab nav -->
  <div class="top-tabs">
    <button class="top-tab on" id="nav-orders" onclick="tab('orders')">
      <span class="tab-icon">≡</span>訂單
    </button>
    <button class="top-tab" id="nav-products" onclick="tab('products')">
      <span class="tab-icon">◻</span>商品
    </button>
    <button class="top-tab" id="nav-classes" onclick="tab('classes')">
      <span class="tab-icon">◈</span>課程
    </button>
    <button class="top-tab" id="nav-questions" onclick="tab('questions')">
      <span class="tab-icon">？</span>提問
    </button>
  </div>

  <div class="wrap">

    <!-- ── 訂單 TAB ──────────────────────────────────────── -->
    <div id="p-orders" class="pane on">
      <!-- Filter bar: scrollable single row -->
      <div class="o-filter-wrap">
        <div class="o-filter-bar">
          <button class="o-ftab on" onclick="filterOrders(this,'all')">全部<span class="cnt" id="cnt-all">0</span></button>
          <button class="o-ftab" onclick="filterOrders(this,'pending')">待確認<span class="cnt" id="cnt-pending">0</span></button>
          <button class="o-ftab" onclick="filterOrders(this,'confirmed')">已確認<span class="cnt" id="cnt-confirmed">0</span></button>
          <button class="o-ftab" onclick="filterOrders(this,'shipped')">已出貨<span class="cnt" id="cnt-shipped">0</span></button>
          <button class="o-ftab" onclick="filterOrders(this,'completed')">完成<span class="cnt" id="cnt-completed">0</span></button>
          <button class="o-ftab" onclick="filterOrders(this,'cancelled')">取消<span class="cnt" id="cnt-cancelled">0</span></button>
        </div>
      </div>
      <div id="o-card-list"></div>
    </div>

    <!-- ── 商品 TAB ──────────────────────────────────────── -->
    <div id="p-products" class="pane">

      <!-- 新增/編輯表單 -->
      <div class="card">
        <div class="ttl" id="ftitle">新增商品</div>
        <input type="hidden" id="eid">

        <div class="fg">
          <label class="lbl">商品照片（最多 6 張）</label>
          <div id="img-grid" class="img-grid"></div>
          <div class="img-upload-area" id="img-upload-area">
            <input type="file" accept="image/*" multiple id="fi" onchange="addFiles(this.files)">
            <div class="img-add-hint">點擊新增照片</div>
          </div>
          <div style="font-size:10px;color:var(--m);margin-top:3px">第一張為主圖，點 × 刪除</div>
        </div>

        <div class="fg"><label class="lbl">商品名稱 *</label><input type="text" id="fname" placeholder="例：青釉花器"></div>
        <div class="f2" style="margin-bottom:12px">
          <div class="fg" style="margin:0"><label class="lbl">分類 *</label>
            <select id="fcat"><option>花器</option><option>線香座</option><option>器皿</option><option>其他</option></select>
          </div>
          <div class="fg" style="margin:0"><label class="lbl">庫存 *</label><input type="number" id="fstock" placeholder="1" min="0"></div>
        </div>
        <div class="fg"><label class="lbl">售價（NT$）*</label><input type="number" id="fprice" placeholder="1200" min="1"></div>
        <div class="fg">
          <label class="lbl">尺寸（cm）</label>
          <div class="size-row">
            <input type="number" id="flen" placeholder="長" min="0" step="0.1" style="width:80px">
            <span class="size-sep">×</span>
            <input type="number" id="fwid" placeholder="寬" min="0" step="0.1" style="width:80px">
            <span class="size-sep">×</span>
            <input type="number" id="fhgt" placeholder="高" min="0" step="0.1" style="width:80px">
            <span style="font-size:11px;color:var(--m);flex-shrink:0">cm</span>
          </div>
        </div>
        <div class="fg"><label class="lbl">商品描述</label><textarea id="fdesc" placeholder="釉色、燒製方式、使用說明..."></textarea></div>
        <div style="display:flex;gap:8px">
          <button class="btn bg" style="padding:9px 18px;font-size:13px" id="sbtn" onclick="save()">儲存商品</button>
          <button class="btn bo" style="padding:9px 18px;font-size:13px" onclick="reset()">清除</button>
        </div>
      </div>

      <!-- 商品列表 -->
      <div style="font-size:14px;font-weight:700;color:var(--t);margin-bottom:10px">
        商品列表 <span id="pcnt" style="color:var(--m);font-size:12px;font-weight:400"></span>
      </div>
      <div id="p-card-list"></div>
    </div>

    <!-- ── 課程 TAB ──────────────────────────────────────── -->
    <div id="p-classes" class="pane">

      <!-- 新增/編輯課程 -->
      <div class="card" style="margin-bottom:16px">
        <div class="ttl" id="class-form-title">新增課程</div>
        <input type="hidden" id="cls-id">
        <div class="fg">
          <label class="lbl">課程照片（最多 6 張）</label>
          <div id="cls-img-grid" class="img-grid"></div>
          <div class="img-upload-area" id="cls-img-upload">
            <input type="file" accept="image/*" multiple id="cls-fi" onchange="clsAddFiles(this.files)">
            <div class="img-add-hint">點擊新增照片</div>
          </div>
          <div style="font-size:10px;color:var(--m);margin-top:3px">第一張為封面主圖，點 × 刪除</div>
        </div>
        <div class="f2" style="margin-bottom:12px">
          <div class="fg" style="margin:0"><label class="lbl">課程類型 *</label>
            <select id="cls-type" onchange="onClsTypeChange(this.value)"><option value="單次體驗">單次體驗</option><option value="專業課程">專業課程</option></select>
          </div>
          <div class="fg" style="margin:0"><label class="lbl">報名狀態</label>
            <select id="cls-active"><option value="true">開放報名</option><option value="false">暫停報名</option></select>
          </div>
        </div>

<div id="toast"></div>
<script>
let TOKEN='';
let allOrders=[];
let currentFilter='all';
let imgFiles=[],pendingUrls=[];

function toast(msg,ok=true){const t=document.getElementById('toast');t.textContent=msg;t.style.background=ok?'#1C2B3A':'#8B6F47';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

async function api(path,opts={}){
  const res=await fetch(`${API}${path}`,{...opts,headers:{'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`,...(opts.headers||{})}});
  const data=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(data.detail||`HTTP ${res.status}`);
  return data;
}

// ── Auth ──────────────────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pwd=document.getElementById('l-pwd').value;
  if(!email||!pwd)return;
  const btn=document.getElementById('l-btn');btn.disabled=true;btn.textContent='登入中...';
  const errEl=document.getElementById('l-err');errEl.style.display='none';
  try{
    const data=await api('/auth/login',{method:'POST',body:JSON.stringify({email,password:pwd})});
    TOKEN=data.access_token;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='block';
    document.getElementById('user-email').textContent=data.email;
    loadOrders(); // 預設顯示訂單
  }catch(e){errEl.textContent=e.message;errEl.style.display='block';}
  finally{btn.disabled=false;btn.textContent='登入';}
}
function doLogout(){TOKEN='';document.getElementById('admin-screen').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('l-pwd').value='';}

// ── Tab ───────────────────────────────────────────────────
function tab(name){
  document.querySelectorAll('.top-tab').forEach((t,i)=>t.classList.toggle('on',['orders','products','classes','questions'][i]===name));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+name).classList.add('on');
  if(name==='orders')loadOrders();
  else if(name==='products')loadProducts();
  else if(name==='classes')loadClassesAdmin();
  else if(name==='questions')loadQuestions();
}

// ── Multi-image ───────────────────────────────────────────
function addFiles(files){
  const rem=6-pendingUrls.length-imgFiles.length;
  const toAdd=Math.min(files.length,rem);
  if(toAdd<=0){toast('最多 6 張',false);return;}
  for(let i=0;i<toAdd;i++)imgFiles.push(files[i]);
  renderImgGrid();
}
function removeImg(idx){
  if(idx<pendingUrls.length)pendingUrls.splice(idx,1);
  else imgFiles.splice(idx-pendingUrls.length,1);
  renderImgGrid();
}
function renderImgGrid(){
  const grid=document.getElementById('img-grid');
  const all=pendingUrls.length+imgFiles.length;
  const eH=pendingUrls.map((url,i)=>`<div class="img-item"><img src="${url}">${i===0?'<div class="img-item-main">主圖</div>':''}<button class="img-item-del" onclick="removeImg(${i})">×</button></div>`).join('');
  const nH=imgFiles.map((f,i)=>{const idx=pendingUrls.length+i;return`<div class="img-item"><img src="${URL.createObjectURL(f)}">${idx===0?'<div class="img-item-main">主圖</div>':''}<button class="img-item-del" onclick="removeImg(${idx})">×</button></div>`;}).join('');
  grid.innerHTML=eH+nH;
  document.getElementById('img-upload-area').style.display=all>=6?'none':'block';
}
async function uploadAllNewImgs(){
  const uploaded=[];
  for(const f of imgFiles){
    const fd=new FormData();fd.append('file',f);
    const res=await fetch(`${API}/upload/`,{method:'POST',headers:{'Authorization':`Bearer ${TOKEN}`},body:fd});
    const data=await res.json();
    if(!res.ok)throw new Error(data.detail||'圖片上傳失敗');
    uploaded.push(data.url);
  }
  return uploaded;
}

// ── Sizes ─────────────────────────────────────────────────
function getSizes(){
  const l=document.getElementById('flen').value;
  const w=document.getElementById('fwid').value;
  const h=document.getElementById('fhgt').value;
  const parts=[l&&`長${l}`,w&&`寬${w}`,h&&`高${h}`].filter(Boolean);
  return parts.length?parts.join(' × ')+' cm':'';
}
function setSizes(str){
  const m=str.match(/長([\d.]+).*寬([\d.]+).*高([\d.]+)/);
  if(m){document.getElementById('flen').value=m[1];document.getElementById('fwid').value=m[2];document.getElementById('fhgt').value=m[3];}
}

// ── Save product ──────────────────────────────────────────
async function save(){
  const name=document.getElementById('fname').value.trim();
  const price=parseInt(document.getElementById('fprice').value);
  const stock=parseInt(document.getElementById('fstock').value);
  if(!name||!price||isNaN(stock)){toast('請填寫必填欄位',false);return;}
  const btn=document.getElementById('sbtn');btn.disabled=true;btn.textContent='儲存中...';
  try{
    const newUrls=await uploadAllNewImgs();
    const allUrls=[...pendingUrls,...newUrls];
    const body={name,price,stock,sizes:getSizes(),category:document.getElementById('fcat').value,description:document.getElementById('fdesc').value,image_url:allUrls[0]||null,image_urls:allUrls};
    const eid=document.getElementById('eid').value;
    if(eid){await api(`/products/${eid}`,{method:'PATCH',body:JSON.stringify(body)});toast('商品已更新！');}
    else{await api('/products/',{method:'POST',body:JSON.stringify(body)});toast('商品已新增！');}
    reset();loadProducts();
  }catch(e){toast('錯誤：'+e.message,false);}
  finally{btn.disabled=false;btn.textContent='儲存商品';}
}
function reset(){
  ['fname','fprice','fstock','fdesc','flen','fwid','fhgt'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('eid').value='';document.getElementById('fcat').value='花器';
  imgFiles=[];pendingUrls=[];renderImgGrid();
  document.getElementById('fi').value='';
  document.getElementById('ftitle').textContent='新增商品';
}
function editP(p){
  tab('products');
  document.getElementById('eid').value=p.id;
  document.getElementById('fname').value=p.name;
  document.getElementById('fcat').value=p.category;
  document.getElementById('fprice').value=p.price;
  document.getElementById('fstock').value=p.stock;
  document.getElementById('fdesc').value=p.description||'';
  setSizes(p.sizes||'');
  imgFiles=[];
  pendingUrls=p.image_urls&&p.image_urls.length?[...p.image_urls]:(p.image_url?[p.image_url]:[]);
  renderImgGrid();
  document.getElementById('ftitle').textContent='編輯商品';
  window.scrollTo({top:0,behavior:'smooth'});
}
async function archiveP(id,name){
  if(!confirm(`封存「${name}」？`))return;
  try{await api(`/products/${id}`,{method:'DELETE'});toast('已封存');loadProducts();}
  catch(e){toast('失敗',false);}
}
async function deleteP(id,name){
  if(!confirm(`永久刪除「${name}」？\n無法復原！`))return;
  try{await api(`/products/${id}/permanent`,{method:'DELETE'});toast('已刪除');loadProducts();}
  catch(e){toast('刪除失敗',false);}
}

// ── Load products ─────────────────────────────────────────
async function loadProducts(){
  try{
    const data=await api('/products');
    document.getElementById('pcnt').textContent=`(${data.length} 項)`;
    const list=document.getElementById('p-card-list');
    if(!data.length){list.innerHTML='<div style="text-align:center;color:var(--m);padding:30px;font-size:13px">尚無商品</div>';return;}
    list.innerHTML=data.map(p=>{
      const imgs=p.image_urls&&p.image_urls.length?p.image_urls:(p.image_url?[p.image_url]:[]);
      const sc=p.stock>5?'bg2':p.stock>0?'ba':'br2';
      const sl=p.stock>5?'充足':p.stock>0?'低庫存':'售完';
      return`<div class="p-card">
        ${imgs.length?`<img class="p-card-img" src="${imgs[0]}">`:`<div class="p-card-img" style="display:flex;align-items:center;justify-content:center;color:var(--b)">◻</div>`}
        <div class="p-card-info">
          <div class="p-card-name">${p.name} <span class="bdg ${sc}">${sl} ${p.stock}</span></div>
          <div class="p-card-meta">${p.category}${p.sizes?' · '+p.sizes:''}</div>
          <div class="p-card-price">NT$${p.price.toLocaleString()}</div>
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            <button class="btn bo" onclick='editP(${JSON.stringify(p)})'>編輯</button>
            <button class="btn br" onclick="archiveP(${p.id},'${p.name.replace(/'/g,"\\'")}')">封存</button>
            <button class="btn br" onclick="deleteP(${p.id},'${p.name.replace(/'/g,"\\'")}')">刪除</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }catch(e){toast('載入失敗',false);}
}

// ── Orders ────────────────────────────────────────────────
const STEPS=[
  {key:'pending',  label:'待確認', icon:'★', cls:'s-pending'},
  {key:'confirmed',label:'已確認', icon:'✔', cls:'s-confirmed'},
  {key:'shipped',  label:'已出貨', icon:'▶', cls:'s-shipped'},
  {key:'completed',label:'完成',   icon:'◆', cls:'s-completed'},
];
const SL={pending:'待確認',confirmed:'已確認',shipped:'已出貨',completed:'完成',cancelled:'已取消'};
const SC={pending:'ba',confirmed:'bg2',shipped:'bg2',completed:'bg2',cancelled:'br2'};

async function loadOrders(){
  try{
    allOrders=await api('/orders');
    updateFilterCounts();
    renderOrders();
  }catch(e){toast('載入訂單失敗',false);}
}

function updateFilterCounts(){
  ['all','pending','confirmed','shipped','completed','cancelled'].forEach(k=>{
    const el=document.getElementById('cnt-'+k);
    if(el)el.textContent=k==='all'?allOrders.length:allOrders.filter(o=>o.status===k).length;
  });
}

function filterOrders(btn,filter){
  document.querySelectorAll('.o-ftab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  currentFilter=filter;
  renderOrders();
}

function progressHTML(orderId, status){
  if(status==='cancelled'){
    return`<div class="progress-wrap">
      <div class="progress-label">訂單狀態</div>
      <div class="cancelled-wrap"><span>✕</span><span>已取消</span></div>
    </div>`;
  }
  const activeIdx=STEPS.findIndex(s=>s.key===status);
  return`<div class="progress-wrap">
    <div class="progress-label">訂單進度 — 點擊切換狀態</div>
    <div class="progress-steps">
      ${STEPS.map((s,i)=>{
        const cls = i < activeIdx ? 'done' : i === activeIdx ? 'active' : '';
        const dotContent = i < activeIdx ? '✓' : (i === activeIdx ? '●' : '○');
        return`<div class="p-step ${cls}" onclick="updateStatus(${orderId},'${s.key}')">
          <div class="p-dot">${dotContent}</div>
          <div class="p-step-label">${s.label}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderOrders(){
  const filtered=currentFilter==='all'?allOrders:allOrders.filter(o=>o.status===currentFilter);
  const list=document.getElementById('o-card-list');
  if(!filtered.length){
    list.innerHTML='<div style="text-align:center;color:var(--m);padding:40px;font-size:13px">此分類尚無訂單</div>';
    return;
  }
  list.innerHTML=filtered.map(o=>{
    const itemStr=(o.items||[]).map(i=>`${i.product_name} ×${i.qty}`).join('、');
    const canDelete=o.status==='cancelled';
    const isDone=o.status==='completed'||o.status==='cancelled';

    if(isDone){
      return`<div class="o-card" style="opacity:.5;cursor:pointer;transition:opacity .2s" onclick="expandOrder(this)" id="ocard-${o.id}" data-expanded="false">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1">
            <div style="font-weight:700;font-size:13px;flex-shrink:0;color:var(--m)">#${o.id}</div>
            <div style="font-size:13px;color:var(--m);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.customer_name}</div>
            <div style="font-size:13px;font-weight:600;color:var(--m);flex-shrink:0">NT$${o.total_amount.toLocaleString()}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            <span class="bdg ${SC[o.status]||'ba'}" style="font-size:10px">${SL[o.status]||o.status}</span>
            <span style="color:var(--b);font-size:16px;line-height:1" class="expand-icon">›</span>
          </div>
        </div>
        <div class="o-detail" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--b)">
          <div class="o-contact">📞 ${o.customer_phone} · ✉️ ${o.customer_email}</div>
          <div class="o-addr">📍 ${o.address}</div>
          <div class="o-items-str" style="margin-top:6px">${itemStr}</div>
          ${o.internal_note?`<div class="o-note">備註：${o.internal_note}</div>`:''}
          <div class="o-actions" style="margin-top:8px">
            <button class="btn bo" onclick="event.stopPropagation();openNote(${o.id},'${(o.internal_note||'').replace(/'/g,"\\'")}')" >備註</button>
            <button class="btn br" ${canDelete?'':`disabled style="opacity:.35;cursor:not-allowed"`} onclick="event.stopPropagation();${canDelete?`deleteOrder(${o.id})`:''}" >刪除</button>
          </div>
        </div>
      </div>`;
    }

    return`<div class="o-card" id="ocard-${o.id}">
      <div class="o-card-top">
        <div>
          <div class="o-id">#${o.id} <span style="font-size:11px;font-weight:400;color:var(--m)">${(o.created_at||'').slice(0,10)}</span></div>
        </div>
        <span class="bdg ${SC[o.status]||'ba'}" style="font-size:11px">${SL[o.status]||o.status}</span>
      </div>
      <div class="o-name">${o.customer_name}</div>
      <div class="o-contact">📞 ${o.customer_phone}</div>
      <div class="o-contact">✉️ ${o.customer_email}</div>
      <div class="o-addr" style="margin-top:2px">📍 ${o.address}</div>
      <div class="o-items-str">${itemStr}</div>
      <div class="o-amount">NT$${o.total_amount.toLocaleString()}<span class="o-pay">· ${o.payment_method}</span></div>
      ${progressHTML(o.id, o.status)}
      ${o.internal_note?`<div class="o-note">備註：${o.internal_note}</div>`:''}
      <div class="o-actions">
        <button class="btn bo" onclick="openEdit(${o.id})">編輯</button>
        <button class="btn br" onclick="updateStatus(${o.id},'cancelled')">標記取消</button>
        <button class="btn bo" onclick="openNote(${o.id},'${(o.internal_note||'').replace(/'/g,"\\'")}')" >備註</button>
      </div>
    </div>`;
  }).join('');
}

function expandOrder(card){
  const detail=card.querySelector('.o-detail');
  const icon=card.querySelector('.expand-icon');
  const expanded=card.dataset.expanded==='true';
  detail.style.display=expanded?'none':'block';
  icon.textContent=expanded?'›':'⌃';
  card.style.opacity=expanded?'.5':'1';
  card.dataset.expanded=String(!expanded);
}

async function updateStatus(id,status){
  try{
    await api(`/orders/${id}`,{method:'PATCH',body:JSON.stringify({status})});
    const o=allOrders.find(x=>x.id===id);
    if(o)o.status=status;
    updateFilterCounts();renderOrders();
    toast('狀態已更新');
  }catch(e){toast('更新失敗',false);}
}

async function deleteOrder(id){
  if(!confirm(`確定刪除訂單 #${id}？\n此操作無法復原！`))return;
  try{
    await api(`/orders/${id}`,{method:'DELETE'});
    allOrders=allOrders.filter(o=>o.id!==id);
    updateFilterCounts();renderOrders();
    toast('訂單已刪除');
  }catch(e){toast('刪除失敗',false);}
}

// ── Note ──────────────────────────────────────────────────
function openNote(id,note){
  document.getElementById('note-order-id').value=id;
  document.getElementById('note-text').value=note||'';
  document.getElementById('note-ov').classList.add('open');
}
function closeNote(){document.getElementById('note-ov').classList.remove('open');}
async function saveNote(){
  const id=document.getElementById('note-order-id').value;
  const note=document.getElementById('note-text').value;
  try{
    const o=allOrders.find(x=>x.id==id);
    await api(`/orders/${id}`,{method:'PATCH',body:JSON.stringify({status:o?.status||'pending',internal_note:note})});
    if(o)o.internal_note=note;
    renderOrders();toast('備註已儲存');closeNote();
  }catch(e){toast('儲存失敗',false);}
}

// ── Classes Admin ─────────────────────────────────────────
let allClasses=[], allRegs=[], clsFilter='all', regFilter='all';
let clsImgFiles=[], clsPendingUrls=[];

function clsAddFiles(files){
  const rem=6-clsPendingUrls.length-clsImgFiles.length;
  for(let i=0;i<Math.min(files.length,rem);i++) clsImgFiles.push(files[i]);
  renderClsImgGrid();
}
function clsRemoveImg(idx){
  if(idx<clsPendingUrls.length) clsPendingUrls.splice(idx,1);
  else clsImgFiles.splice(idx-clsPendingUrls.length,1);
  renderClsImgGrid();
}
function renderClsImgGrid(){
  const grid=document.getElementById('cls-img-grid');if(!grid)return;
  const all=clsPendingUrls.length+clsImgFiles.length;
  grid.innerHTML=clsPendingUrls.map((url,i)=>`<div class="img-item"><img src="${url}">${i===0?'<div class="img-item-main">主圖</div>':''}<button class="img-item-del" onclick="clsRemoveImg(${i})">×</button></div>`).join('')+
    clsImgFiles.map((f,i)=>{const idx=clsPendingUrls.length+i;return`<div class="img-item"><img src="${URL.createObjectURL(f)}">${idx===0?'<div class="img-item-main">主圖</div>':''}<button class="img-item-del" onclick="clsRemoveImg(${idx})">×</button></div>`;}).join('');
  const ua=document.getElementById('cls-img-upload');if(ua)ua.style.display=all>=6?'none':'block';
}
async function clsUploadImgs(){
  const up=[];
  for(const f of clsImgFiles){
    const fd=new FormData();fd.append('file',f);
    const res=await fetch(`${API}/upload/`,{method:'POST',headers:{'Authorization':`Bearer ${TOKEN}`},body:fd});
    const d=await res.json();if(!res.ok)throw new Error(d.detail||'上傳失敗');up.push(d.url);
  }
  return up;
}
function resetClass(){
  ['cls-name','cls-price','cls-capacity','cls-duration','cls-location','cls-date','cls-price-note','cls-description','cls-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('cls-id').value='';
  document.getElementById('cls-type').value='手作陶體驗';
  sessions=[];onClsTypeChange('手作陶體驗');
  document.getElementById('cls-active').value='true';
  const t=document.getElementById('class-form-title');if(t)t.textContent='新增課程';
  clsImgFiles=[];clsPendingUrls=[];renderClsImgGrid();
  const fi=document.getElementById('cls-fi');if(fi)fi.value='';
  ['cls-instructor-name','cls-instructor-bio'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const ipu=document.getElementById('cls-instructor-photo-url');if(ipu)ipu.value='';
  const ipp=document.getElementById('cls-instructor-photo-preview');if(ipp)ipp.innerHTML='';
  const iph=document.getElementById('cls-instructor-photo-hint');if(iph)iph.textContent='點擊上傳講師照片';
}
function editClass(cls){
  document.getElementById('cls-id').value=cls.id;
  document.getElementById('cls-type').value=cls.type||'手作陶體驗';
  document.getElementById('cls-active').value=String(cls.is_active);
  [{k:'name',f:'name'},{k:'price',f:'price'},{k:'capacity',f:'capacity'},{k:'duration',f:'duration'},{k:'location',f:'location'},{k:'price_note',f:'price-note'},{k:'description',f:'description'},{k:'notes',f:'notes'},{k:'instructor_name',f:'instructor-name'},{k:'instructor_bio',f:'instructor-bio'}].forEach(({k,f})=>{const el=document.getElementById('cls-'+f);if(el)el.value=cls[k]||'';});
  const ipu=document.getElementById('cls-instructor-photo-url');if(ipu)ipu.value=cls.instructor_photo||'';
  const ipp=document.getElementById('cls-instructor-photo-preview');
  if(ipp&&cls.instructor_photo)ipp.innerHTML=`<img src="${cls.instructor_photo}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;margin-top:6px">`;
  const dt=document.getElementById('cls-date');if(dt)dt.value=cls.date_desc||'';
  // Init sessions for throwing
  sessions=[];
  if(cls.type==='專業課程'){
    onClsTypeChange('專業課程');
    // Parse existing date_desc into sessions
    if(cls.date_desc){
      cls.date_desc.split('\n').forEach(line=>{
        const m=line.match(/第\d+堂｜(\S+)\s+(\S+)–(\S+)(?:｜(.*))?/)|| line.match(/(\S+)\s+(\S+)–(\S+)/);
        if(m) sessions.push({id:Date.now()+Math.random(),date:m[1],start:m[2],end:m[3],content:m[4]||''});
      });
      renderSessions();
    }
  } else {
    onClsTypeChange(cls.type||'單次體驗');
  }
  clsImgFiles=[];clsPendingUrls=cls.image_urls?.length?[...cls.image_urls]:cls.image_url?[cls.image_url]:[];
  renderClsImgGrid();
  const t=document.getElementById('class-form-title');if(t)t.textContent='編輯課程';
  window.scrollTo({top:0,behavior:'smooth'});
}
async function saveClass(){
  const name=document.getElementById('cls-name').value.trim();
  const price=parseInt(document.getElementById('cls-price').value);
  const cap=parseInt(document.getElementById('cls-capacity').value);
  if(!name||!price||!cap){toast('請填寫必填欄位',false);return;}
  const btn=document.getElementById('cls-save-btn');btn.disabled=true;btn.textContent='儲存中...';
  try{
    const newUrls=await clsUploadImgs();
    const allUrls=[...clsPendingUrls,...newUrls];
    const body={type:document.getElementById('cls-type').value,name,price,capacity:cap,
      date_desc:document.getElementById('cls-date').value,duration:document.getElementById('cls-duration').value,
      location:document.getElementById('cls-location').value,price_note:document.getElementById('cls-price-note').value,
      description:document.getElementById('cls-description').value,notes:document.getElementById('cls-notes').value,
      is_active:document.getElementById('cls-active').value==='true',image_url:allUrls[0]||'',image_urls:allUrls,
      instructor_name:document.getElementById('cls-instructor-name').value||'',
      instructor_bio:document.getElementById('cls-instructor-bio').value||'',
      instructor_photo:document.getElementById('cls-instructor-photo-url').value||''};
    const eid=document.getElementById('cls-id').value;
    if(eid){await api(`/classes/admin/classes/${eid}`,{method:'PATCH',body:JSON.stringify(body)});toast('課程已更新！');}
    else{await api('/classes/admin/classes',{method:'POST',body:JSON.stringify(body)});toast('課程已新增！');}
    resetClass();loadClassesAdmin();
  }catch(e){toast('錯誤：'+e.message,false);}
  finally{btn.disabled=false;btn.textContent='儲存課程';}
}
async function deleteClass(id){
  if(!confirm('確定刪除此課程？'))return;
  try{await api(`/classes/admin/classes/${id}`,{method:'DELETE'});toast('已刪除');loadClassesAdmin();}
  catch(e){toast('失敗',false);}
}
async function loadClassesAdmin(){
  try{
    [allClasses,allRegs]=await Promise.all([api('/classes/admin/classes'),api('/classes/admin/registrations')]);
    renderClasses();renderRegs();
    ['all','workshop','throwing'].forEach(k=>{const el=document.getElementById('cls-cnt-'+k);if(el)el.textContent=k==='all'?allClasses.length:allClasses.filter(c=>c.type===(k==='workshop'?'手作陶體驗':'基礎手拉坯')).length;});
    ['all','pending','paid','confirmed','cancelled'].forEach(s=>{const el=document.getElementById('rcnt-'+s);if(el)el.textContent=s==='all'?allRegs.length:allRegs.filter(r=>r.status===s).length;});
  }catch(e){toast('載入課程失敗',false);}
}
function filterClasses(btn,f){document.querySelectorAll('#p-classes .o-ftab:not(.o-filter-bar .o-ftab)').forEach(t=>t.classList.remove('on'));btn.classList.add('on');clsFilter=f;renderClasses();}
function filterRegs(btn,f){document.querySelectorAll('#p-classes .o-filter-bar .o-ftab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');regFilter=f;renderRegs();}
function renderClasses(){
  const filtered=clsFilter==='all'?allClasses:allClasses.filter(c=>c.type===(clsFilter==='workshop'?'手作陶體驗':'基礎手拉坯'));
  const list=document.getElementById('cls-list');if(!list)return;
  if(!filtered.length){list.innerHTML='<div style="text-align:center;color:var(--m);padding:30px;font-size:13px">尚無課程</div>';return;}
  list.innerHTML=filtered.map(cls=>{
    const imgs=cls.image_urls?.length?cls.image_urls:cls.image_url?[cls.image_url]:[];
    const full=cls.registered>=cls.capacity;
    const sc=!cls.is_active?'ba':full?'br2':'bg2';
    const sl=!cls.is_active?'暫停':full?'已滿':cls.registered+'/'+cls.capacity;
    return`<div class="p-card">
      ${imgs.length?`<img class="p-card-img" src="${imgs[0]}">`:`<div class="p-card-img" style="display:flex;align-items:center;justify-content:center;color:var(--b)">◻</div>`}
      <div class="p-card-info">
        <div class="p-card-name">${cls.name} <span class="bdg ${sc}">${sl}</span></div>
        <div class="p-card-meta">${cls.type}${cls.date_desc?' · '+cls.date_desc.split('\n')[0]:''}</div>
        <div class="p-card-price">NT$${cls.price.toLocaleString()} / ${cls.capacity}人</div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <button class="btn bo btn-sm" onclick='editClass(${JSON.stringify(cls)})'>編輯</button>
          <button class="btn br btn-sm" onclick="deleteClass(${cls.id})">刪除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
const RSL={pending:'待確認',paid:'已匯款',confirmed:'已確認',cancelled:'已取消'};
const RSC={pending:'ba',paid:'bg2',confirmed:'bg2',cancelled:'br2'};
function renderRegs(){
  const filtered=regFilter==='all'?allRegs:allRegs.filter(r=>r.status===regFilter);
  const list=document.getElementById('reg-list');if(!list)return;
  if(!filtered.length){list.innerHTML='<div style="text-align:center;color:var(--m);padding:30px;font-size:13px">此分類尚無報名</div>';return;}
  list.innerHTML=filtered.map(r=>`
    <div class="o-card">
      <div class="o-card-top"><div><div class="o-id" style="font-size:13px">#${r.id} ${r.name}</div>
        <div class="o-date">${r.class_title}${r.course_type?' · '+r.course_type:''}${r.members>1?' · '+r.members+'人':''}</div></div>
        <span class="bdg ${RSC[r.status]||'ba'}">${RSL[r.status]||r.status}</span>
      </div>
      <div class="o-contact">📞 ${r.phone} · ✉️ ${r.email}</div>
      <div style="font-weight:600;color:var(--g);margin:6px 0 8px">NT$${r.total_amount.toLocaleString()}</div>
      ${r.payment_last5?`<div style="font-size:12px;color:var(--g);background:var(--gl);padding:6px 10px;border-radius:7px;margin-bottom:8px">後五碼：${r.payment_last5}</div>`:''}
      <div style="display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap">
        <select style="padding:5px 8px;border:1px solid var(--b);border-radius:7px;font-size:12px;font-family:inherit;background:var(--w);color:var(--t)" onchange="updateRegStatus(${r.id},this.value)">
          ${['pending','paid','confirmed','cancelled'].map(s=>`<option value="${s}"${s===r.status?' selected':''}>${RSL[s]}</option>`).join('')}
        </select>
        <button class="btn br btn-sm" onclick="deleteReg(${r.id})" style="font-size:11px">刪除</button>
      </div>
    </div>`).join('');
}
async function deleteReg(id){
  if(!confirm('確定刪除此報名記錄？此操作無法復原'))return;
  try{
    await api(`/classes/admin/registrations/${id}`,{method:'DELETE'});
    allRegs=allRegs.filter(r=>r.id!==id);
    renderRegs();toast('已刪除');
  }catch(e){toast('刪除失敗',false);}
}

async function updateRegStatus(id,status){
  try{await api(`/classes/admin/registrations/${id}`,{method:'PATCH',body:JSON.stringify({status})});
    const r=allRegs.find(x=>x.id===id);if(r)r.status=status;renderRegs();toast('狀態已更新');
  }catch(e){toast('更新失敗',false);}
}

// ── Course type toggle ─────────────────────────────────────
function onClsTypeChange(type){
  const isThrowing=type==='專業課程';
  const tw=document.getElementById('cls-date-text-wrap');
  const pw=document.getElementById('cls-date-picker-wrap');
  if(tw)tw.style.display=isThrowing?'none':'block';
  if(pw)pw.style.display=isThrowing?'block':'none';
}

// ── Session management for throwing ───────────────────────
let sessions=[];

function addSession(){
  sessions.push({id:Date.now(),date:'',start:'09:00',end:'12:00',content:''});
  renderSessions();
}
function removeSession(id){
  sessions=sessions.filter(s=>s.id!==id);
  renderSessions();
}
function updateSession(id,field,val){
  const s=sessions.find(x=>x.id===id);
  if(s){s[field]=val;renderSessions();}
}
function timeOptions(sel){
  return ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00']
    .map(t=>`<option value="${t}"${t===sel?' selected':''}>${t}</option>`).join('');
}
function renderSessions(){
  const list=document.getElementById('cls-sessions-list');
  if(!list)return;
  list.innerHTML=sessions.map((s,i)=>`
    <div style="border:1px solid var(--b);border-radius:8px;padding:10px;margin-bottom:4px">
      <div style="font-size:11px;font-weight:600;color:var(--g);margin-bottom:8px">第 ${i+1} 堂</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px">
        <input type="date" value="${s.date}" onchange="updateSession(${s.id},'date',this.value)"
          style="flex:1;min-width:130px;padding:8px 10px;border:1px solid var(--b);border-radius:7px;font-size:13px;font-family:inherit;background:var(--w);color:var(--t);outline:none">
        <select onchange="updateSession(${s.id},'start',this.value)"
          style="padding:8px 10px;border:1px solid var(--b);border-radius:7px;font-size:13px;font-family:inherit;background:var(--w);color:var(--t);outline:none">
          ${timeOptions(s.start)}
        </select>
        <span style="font-size:12px;color:var(--m)">–</span>
        <select onchange="updateSession(${s.id},'end',this.value)"
          style="padding:8px 10px;border:1px solid var(--b);border-radius:7px;font-size:13px;font-family:inherit;background:var(--w);color:var(--t);outline:none">
          ${timeOptions(s.end)}
        </select>
        <button class="btn br btn-sm" onclick="removeSession(${s.id})" style="padding:6px 10px">×</button>
      </div>
      <input type="text" value="${s.content||''}" placeholder="本堂課程內容說明，例：陶土中心定位練習" onchange="updateSession(${s.id},'content',this.value)"
        style="width:100%;padding:7px 10px;border:1px solid var(--b);border-radius:7px;font-size:12px;font-family:inherit;background:var(--w);color:var(--t);outline:none">
    </div>`).join('');
  // Update date_desc hidden field
  const desc=sessions.map((s,i)=>`第${i+1}堂｜${s.date} ${s.start}–${s.end}${s.content?'｜'+s.content:''}`).filter(s=>s.trim()!=='–').join('\n');
  const dt=document.getElementById('cls-date');
  if(dt)dt.value=desc;
}


</script>
</body>
