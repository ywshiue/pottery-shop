<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>是陶。It's Pottery</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  background:#E0DCD5;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}
.wrap{
  display:flex;flex-direction:column;
  align-items:center;
  gap:0;
}
.logo{opacity:0;animation:up .8s ease .2s forwards;margin-bottom:18px}
.name{
  font-size:28px;font-weight:500;color:#1C2B3A;letter-spacing:3px;
  opacity:0;animation:up .7s ease .7s forwards;margin-bottom:6px
}
.en{
  font-size:8px;font-weight:300;color:#6B7280;letter-spacing:2.5px;text-transform:uppercase;
  opacity:0;animation:up .6s ease 1.1s forwards;
  margin-bottom:36px;
}
.links{
  display:flex;gap:28px;
  opacity:0;animation:up .5s ease 1.5s forwards;
}
.link{
  display:flex;flex-direction:row;align-items:center;gap:7px;
  text-decoration:none;
  transition:opacity .2s;
}
.link:hover{opacity:.7}
.link-text{font-size:11px;color:#6B7280;letter-spacing:1.5px}
.link-arrow{
  color:#6B7280;
  display:flex;align-items:center;
  transition:transform .2s;
}
.link:hover .link-arrow{transform:translateX(2px)}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <svg width="64" height="64" viewBox="-2 -2 124 124" fill="none">
      <path d="M62 7 C76 3 94 10 106 24 C120 40 124 62 116 80 C107 100 88 112 66 114 C44 116 24 104 14 86 C2 66 2 42 16 24 C30 8 46 3 62 7 Z" stroke="#2C4A6E" stroke-width="2.5" fill="none"/>

      <ellipse cx="48" cy="44" rx="16" ry="10" stroke="#2C4A6E" stroke-width="1.4" fill="none" opacity=".5" transform="rotate(-15 48 44)"/>
      <ellipse cx="82" cy="72" rx="13" ry="8" stroke="#2C4A6E" stroke-width="1.2" fill="none" opacity=".4" transform="rotate(10 82 72)"/>
      <circle cx="92" cy="40" r="5" stroke="#2C4A6E" stroke-width="1.2" fill="none" opacity=".5"/>
      <circle cx="34" cy="64" r="4" stroke="#7BA3C8" stroke-width="1" fill="none" opacity=".4"/>
      <line x1="40" y1="28" x2="56" y2="34" stroke="#7BA3C8" stroke-width=".8" stroke-linecap="round" opacity=".4"/>
    </svg>
  </div>
  <div class="name">是陶。</div>
  <div class="en">It's Pottery</div>
  <div class="links">

    </a>

    </a>
  </div>
</div>
